<div class="entries" #entriesEl role="log" aria-live="polite" aria-atomic="false">
  @for (entry of gameState.logs(); track entry.id) {
    <article class="entry-card" [class]="entry.type" [class.latest]="entry.id === latestLogId()">
      <span class="entry-rail" aria-hidden="true"></span>
      <header>
        <span class="entry-icon">{{ logIcon(entry.type) }}</span>
        <strong>{{ logLabel(entry.type) }}</strong>
        <time>{{ formatTime(entry.createdAt) }}</time>
      </header>
      <p>{{ entry.message }}</p>
    </article>
  } @empty {
    <p class="entries-empty">Noch keine Ereignisse — beginne deinen Zug.</p>
  }
</div>
